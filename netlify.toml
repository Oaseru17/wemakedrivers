[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/api/students"
  to = "/.netlify/functions/students"
  status = 200

[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/api/blocked-slots"
  to = "/.netlify/functions/blocked-slots"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
